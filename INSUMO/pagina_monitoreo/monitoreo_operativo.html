          if (progress >= 75) return { text: 'Avanzado', bg: 'bg-emerald-100', textC: 'text-emerald-800', border: 'border-emerald-200', icon: 'check-circle' };
          if (progress >= 40) return { text: 'En Proceso', bg: 'bg-amber-100', textC: 'text-amber-800', border: 'border-amber-200', icon: 'clock' };

        function App() {
          const [activeItem, setActiveItem] = useState(null);

          // NUEVO: Filtro Global de Tipo
          const [selectedType, setSelectedType] = useState('Todos');

          const resultadosFilters = ['Todos', ...new Set(eramForestData.map(item => item.resultado.split(':')[0]))];

          // Procesar Datos
          const processedData = useMemo(() => {
            return eramForestData
              .map(item => {
                const currentValue = item.countries.reduce((acc, curr) => acc + curr.value, 0);
                const progress = Math.min(100, Math.round((currentValue / item.targetValue) * 100));
                return { ...item, currentValue, progress };
              })
              .filter(item => {
                // Filtro Buscador
                const searchLower = searchTerm.toLowerCase();
                const matchesSearch = item.resultado.toLowerCase().includes(searchLower) ||
                                      item.line.toLowerCase().includes(searchLower) ||
                                      item.accionEstrategica.toLowerCase().includes(searchLower) ||
                                      item.indicator.toLowerCase().includes(searchLower);
                
                // Filtro Resultado
                const matchesFilter = selectedResultado === 'Todos' || item.resultado.startsWith(selectedResultado);
                
                // Filtro Tipo (Gestión vs Impacto)
                const matchesType = selectedType === 'Todos' || item.type === selectedType;

                return matchesSearch && matchesFilter && matchesType;
              });
          }, [searchTerm, selectedResultado, selectedType]);

          // Agrupar por Resultado
          const groupedData = useMemo(() => {
            const groups = {};
            processedData.forEach(item => {
              if (!groups[item.resultado]) groups[item.resultado] = [];
              groups[item.resultado].push(item);
            });
            return Object.keys(groups).sort().reduce((acc, key) => {
              acc[key] = groups[key];
              return acc;
            }, {});
          }, [processedData]);

          const totalProgress = processedData.length > 0 
            ? Math.round(processedData.reduce((acc, curr) => acc + curr.progress, 0) / processedData.length)
            : 0;
          const criticalItems = processedData.filter(d => d.progress < 40).length;

          return (
            <div className="min-h-screen flex flex-col">
              
              {/* HEADER ERAM CON BUSCADOR */}
              <header className="bg-slate-900 text-white shadow-lg sticky top-0 z-10 border-b-4 border-emerald-600">
                <div className="max-w-6xl mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
                  <div className="flex items-center gap-4">
                    <div className="bg-emerald-600 p-2 rounded-lg">
                      <Icon name="trees" className="w-8 h-8 text-white" />
                    </div>
                    <div>
                      <h1 className="text-xl font-bold tracking-wide uppercase">Monitoreo Operativo ERAM</h1>
                      <p className="text-emerald-400 text-sm font-medium">Eje Estratégico: Bosques y Paisajes Sostenibles</p>
                    </div>
                  </div>
                  
                  <div className="relative w-full md:w-80 shrink-0">
                    <Icon name="search" className="absolute left-3 top-2.5 h-4 w-4 text-slate-400 pointer-events-none" />
                    <input
                      type="text"
                      className="block w-full pl-10 pr-3 py-2 border border-slate-700 rounded-lg bg-slate-800 text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition-colors text-sm"
                      placeholder="Buscar acción o indicador..."
                      value={searchTerm}
                      onChange={(e) => setSearchTerm(e.target.value)}
                    />
                  </div>
                </div>
              </header>

              <main className="max-w-6xl mx-auto px-4 py-8 flex-1 w-full">
                
                {/* BOTONERA DOBLE DE FILTROS */}
                <div className="flex flex-col gap-4 mb-8">
                  {/* Filtros de Tipología (NUEVO) */}
                  <div className="flex space-x-2">
                    <span className="text-sm font-bold text-slate-500 uppercase tracking-wider flex items-center mr-2">Tipología:</span>
                    <button onClick={() => setSelectedType('Todos')} className={`px-4 py-1.5 rounded-md text-sm font-bold transition-colors border ${selectedType === 'Todos' ? 'bg-slate-700 text-white border-slate-700' : 'bg-white text-slate-600 border-slate-300 hover:bg-slate-100'}`}>Ambos</button>
                    <button onClick={() => setSelectedType('impacto')} className={`px-4 py-1.5 rounded-md text-sm font-bold transition-colors border flex items-center gap-1 ${selectedType === 'impacto' ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-blue-600 border-blue-200 hover:bg-blue-50'}`}>
                      <Icon name="target" className="w-4 h-4"/> Impacto
                    </button>
                    <button onClick={() => setSelectedType('gestion')} className={`px-4 py-1.5 rounded-md text-sm font-bold transition-colors border flex items-center gap-1 ${selectedType === 'gestion' ? 'bg-emerald-600 text-white border-emerald-600' : 'bg-white text-emerald-600 border-emerald-200 hover:bg-emerald-50'}`}>
                      <Icon name="clipboard-list" className="w-4 h-4"/> Gestión
                    </button>
                  </div>

                  {/* Filtros de Resultado */}
                  <div className="flex space-x-2 overflow-x-auto pb-2 custom-scrollbar">
                    <span className="text-sm font-bold text-slate-500 uppercase tracking-wider flex items-center mr-2 shrink-0">Resultado:</span>
                    {resultadosFilters.map(res => {
                      const label = res === 'Todos' ? 'Mostrar Todos' : `Filtrar ${res}`;
                      return (
                        <button
                          key={res}
                          onClick={() => setSelectedResultado(res)}
                          className={`px-4 py-1.5 rounded-full text-sm font-bold whitespace-nowrap transition-colors flex-shrink-0 border ${
                            selectedResultado === res 
                            ? 'bg-slate-800 text-white border-slate-800 shadow-sm' 
                            : 'bg-white text-slate-600 border-slate-200 hover:bg-slate-100'
                          }`}
                        >
                          {label}
                        </button>
                      )
                    })}
                  </div>
                </div>

                {/* KPI DASHBOARD GLOBAL */}
                <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
                  <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6 flex items-center gap-4">
                    <div className="rounded-full bg-emerald-100 p-4">
                      <Icon name="bar-chart-big" className="w-6 h-6 text-emerald-600" />
                    </div>
                    <div>
                      <p className="text-sm font-bold text-slate-500 uppercase">Avance Medio Ponderado</p>
                      <h3 className="text-3xl font-black text-slate-800">{totalProgress}% <span className="text-sm font-medium text-slate-400">al 2025</span></h3>
                    </div>
                  </div>
                  <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6 flex items-center gap-4">
                    <div className="rounded-full bg-blue-100 p-4">
                      <Icon name="list-checks" className="w-6 h-6 text-blue-600" />
                    </div>
                    <div>
                      <p className="text-sm font-bold text-slate-500 uppercase">Indicadores Filtrados</p>
                      <h3 className="text-3xl font-black text-slate-800">{processedData.length}</h3>
                    </div>
                  </div>
                  <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6 flex items-center gap-4">
                    <div className="rounded-full bg-rose-100 p-4">
                      <Icon name="alert-circle" className="w-6 h-6 text-rose-600" />
                    </div>
                    <div>
                      <p className="text-sm font-bold text-slate-500 uppercase">Líneas en Rezago</p>
                      <h3 className="text-3xl font-black text-rose-600">{criticalItems} <span className="text-sm font-medium text-slate-400">Alertas</span></h3>
                    </div>
                  </div>
                </div>

                {/* LISTADO DE INDICADORES AGRUPADOS POR RESULTADO */}
                {Object.keys(groupedData).length === 0 ? (
                  <div className="text-center py-12">
                    <Icon name="search-x" className="w-16 h-16 text-slate-300 mx-auto mb-4" />
                    <h3 className="text-xl font-bold text-slate-600">No se encontraron indicadores</h3>
                    <p className="text-slate-500">Intenta buscar con otros términos o cambia la tipología.</p>
                  </div>
                ) : (
                  Object.entries(groupedData).map(([resultadoStr, items]) => {
                    const [resCode, ...resTitleArr] = resultadoStr.split(':');
                    const resTitle = resTitleArr.join(':').trim();

                    return (
                      <div key={resultadoStr} className="mb-12">
                        <div className="flex items-center gap-3 mb-6 bg-slate-200/50 p-4 rounded-xl border border-slate-200">
                          <div className="bg-slate-800 px-3 py-2 rounded-lg shadow-sm">
                            <span className="text-white font-black text-lg">{resCode}</span>
                          </div>
                          <div>
                            <h2 className="text-xl font-black text-slate-800 leading-tight">{resTitle}</h2>
                          </div>
                        </div>

                        <div className="space-y-4 pl-0 sm:pl-4 border-l-4 border-slate-300 ml-4">
                          {items.map((item, idx) => (
                            <IndicatorCard key={idx} item={item} onClick={setActiveItem} />
                          ))}
                        </div>
                      </div>
                    )
                  })
                )}

              </main>

              {/* MODAL / FICHA DE DESGLOSE Y VERIFICACIÓN */}
              {activeItem && (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 sm:p-6">
                  <div className="absolute inset-0 bg-slate-900/70 backdrop-blur-sm" onClick={() => setActiveItem(null)}></div>
                  <div className="relative bg-slate-50 rounded-2xl shadow-2xl w-full max-w-5xl max-h-[95vh] flex flex-col overflow-hidden">
                    
                    <div className={`flex items-start justify-between p-6 border-b border-slate-200 ${activeItem.type === 'impacto' ? 'bg-blue-50/50' : 'bg-emerald-50/50'}`}>
                      <div>
                        <span className={`inline-flex items-center gap-2 px-3 py-1 rounded-md text-xs font-bold font-mono border mb-3 ${activeItem.type === 'impacto' ? 'bg-blue-100 text-blue-700 border-blue-200' : 'bg-emerald-100 text-emerald-700 border-emerald-200'}`}>
                          {activeItem.id} • Análisis de {activeItem.type === 'impacto' ? 'Impacto Operativo' : 'Gestión Institucional'}
                        </span>
                        <h2 className="text-2xl font-bold text-slate-900 leading-tight mb-2">{activeItem.line}</h2>
                        <p className="text-sm text-slate-600 flex items-start gap-2 max-w-3xl">
                           <Icon name="zap" className={`w-4 h-4 shrink-0 mt-0.5 ${activeItem.type === 'impacto' ? 'text-blue-500' : 'text-emerald-500'}`} /> 
                           <span className="italic">{activeItem.accionEstrategica}</span>
                        </p>
                      </div>
                      <button onClick={() => setActiveItem(null)} className="p-2 text-slate-400 hover:text-rose-600 hover:bg-rose-50 rounded-full transition-colors">
                        <Icon name="x" className="w-6 h-6" />
                      </button>
                    </div>

                    <div className="p-6 overflow-y-auto custom-scrollbar flex-1 space-y-8">
                      
                      {/* TRATAMIENTO DIFERENCIADO EN MODAL: CAJA RESUMEN */}
                      <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div className={`${activeItem.type === 'impacto' ? 'bg-blue-600' : 'bg-emerald-600'} text-white p-5 rounded-xl shadow-sm`}>
                           <p className={`${activeItem.type === 'impacto' ? 'text-blue-200' : 'text-emerald-200'} text-sm font-bold uppercase tracking-wide`}>
                              {activeItem.type === 'impacto' ? 'Volumen Físico Ejecutado' : 'Instrumentos Habilitados'}
                           </p>
                           <h3 className="text-3xl font-black mt-1">{activeItem.currentValue.toLocaleString()}</h3>
                           <p className={`${activeItem.type === 'impacto' ? 'text-blue-100' : 'text-emerald-100'} text-sm`}>{activeItem.unit}</p>
                        </div>
                        <div className="bg-white border border-slate-200 p-5 rounded-xl shadow-sm">
                           <p className="text-slate-500 text-sm font-bold uppercase tracking-wide">Meta ERAM al 2025</p>
                           <h3 className="text-3xl font-black text-slate-800 mt-1">{activeItem.targetValue.toLocaleString()}</h3>
                           <p className="text-slate-500 text-sm">{activeItem.unit}</p>
                        </div>
                        <div className="bg-white border border-slate-200 p-5 rounded-xl shadow-sm flex flex-col justify-center">
                           <div className="flex justify-between items-center mb-2">
                             <span className="text-slate-500 font-bold uppercase text-sm">Progreso Logrado</span>
                             <span className={`text-xl font-black ${activeItem.progress >= 50 ? 'text-emerald-600' : 'text-amber-600'}`}>{activeItem.progress}%</span>
                           </div>
                           <div className="w-full bg-slate-100 rounded-full h-2.5 overflow-hidden">
                              <div className={`${getProgressColor(activeItem.progress)} h-2.5 rounded-full`} style={{width: `${activeItem.progress}%`}}></div>
                           </div>
                        </div>
                      </div>

                      {/* DESGLOSE POR PAÍS */}
                      <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                        <div className="bg-slate-50 p-4 border-b border-slate-200 flex justify-between items-center">
                          <h3 className="text-md font-bold text-slate-800 flex items-center gap-2">
                            <Icon name="map-pin" className={`w-5 h-5 ${activeItem.type === 'impacto' ? 'text-blue-600' : 'text-emerald-600'}`} /> Aporte Nacional a la Meta
                          </h3>
                        </div>
                        <div className="p-5">
                          <div className="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-4">
                            {activeItem.countries.sort((a,b) => b.value - a.value).map((country, idx) => {
                              // El % visual evita dividir entre cero. Para Gestión, llena al 100% si aportó su unidad.
                              let visualWidth = 0;
                              if (activeItem.type === "gestion") {
                                visualWidth = country.value > 0 ? 100 : 0;
                              } else {
                                const maxCountryValue = Math.max(...activeItem.countries.map(c => c.value));
                                visualWidth = maxCountryValue > 0 ? (country.value / maxCountryValue) * 100 : 0;
                              }
                              
                              return (
                                <div key={idx} className="flex flex-col border-b border-slate-100 pb-2">
                                  <div className="flex justify-between items-end mb-1">
                                    <span className="text-sm font-bold text-slate-700">{country.name}</span>
                                    <span className={`text-sm font-mono font-bold ${activeItem.type === 'impacto' ? 'text-blue-700' : 'text-emerald-700'}`}>
                                      {country.value.toLocaleString()} <span className="text-xs text-slate-400 font-sans">{activeItem.type === 'gestion' ? (country.value > 0 ? 'Logrado' : 'Pendiente') : activeItem.unit.split(' ')[0]}</span>
                                    </span>
                                  </div>
                                  <div className="w-full bg-slate-100 rounded-full h-1.5 mt-1">
                                    <div className={`${activeItem.type === 'impacto' ? 'bg-blue-400' : 'bg-emerald-400'} h-1.5 rounded-full`} style={{width: `${visualWidth}%`}}></div>
                                  </div>
                                </div>
                              )
                            })}
                          </div>
                        </div>
                      </div>

                      {/* MEDIOS DE VERIFICACIÓN (AUDITORÍA) */}
                      <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                        <div className={`${activeItem.type === 'impacto' ? 'bg-blue-900' : 'bg-emerald-900'} p-4 flex items-center justify-between`}>
                          <h3 className="text-md font-bold text-white flex items-center gap-2">
                            <Icon name="folder-check" className="w-5 h-5 text-white/70" /> Respaldo Documental (Auditoría)
                          </h3>
                          <span className="text-xs font-bold text-slate-800 bg-white px-3 py-1 rounded-full">Evidencia reportada por el país</span>
                        </div>
                        <div className="p-0">
                          <ul className="divide-y divide-slate-100">
                            {activeItem.verificationMeans.map((mv, i) => {
                              let req = typeof mv.required === 'number' ? mv.required : mv.uploaded;
                              let statusPercent = Math.min(100, (mv.uploaded / req) * 100);
                              let isComplete = statusPercent === 100;

                              return (
                                <li key={i} className="p-4 sm:p-5 hover:bg-slate-50 transition-colors flex flex-col sm:flex-row gap-4 justify-between items-start sm:items-center">
                                  <div className="flex gap-4 items-start w-full">
                                    <div className={`p-3 rounded-lg flex-shrink-0 ${isComplete ? 'bg-emerald-100 text-emerald-600' : 'bg-slate-100 text-slate-500'}`}>
                                      <Icon name={getVerificationIcon(mv.type)} className="w-6 h-6" />
                                    </div>
                                    <div className="flex-1">
                                      <h4 className="font-bold text-slate-800 text-sm mb-1">{mv.name}</h4>
                                      <div className="flex flex-col sm:flex-row sm:items-center gap-2 sm:gap-6 mt-2">
                                        <p className="text-xs text-slate-500 font-mono">
                                          Archivos validados: <span className="font-bold text-slate-700">{mv.uploaded}</span> {mv.required !== 'N/A' && `/ ${mv.required}`}
                                        </p>
                                        <div className="flex-1 max-w-xs flex items-center gap-2">
                                           <div className="w-full bg-slate-200 rounded-full h-1.5">
                                              <div className={`${isComplete ? 'bg-emerald-500' : 'bg-amber-400'} h-1.5 rounded-full`} style={{width: `${statusPercent}%`}}></div>
                                           </div>
                                        </div>
                                      </div>
                                    </div>
                                    <button className="hidden sm:flex shrink-0 px-4 py-2 bg-white border border-slate-300 text-slate-700 text-xs font-bold rounded hover:bg-slate-100 transition-colors justify-center items-center gap-2">
                                      Explorar
                                    </button>
                                  </div>
                                </li>
                              )
                            })}
                          </ul>
                        </div>
                      </div>

                    </div>
                  </div>
                </div>
              )}

            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
